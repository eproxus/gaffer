---
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: gaffer_test
      POSTGRES_USER: gaffer
      POSTGRES_PASSWORD: gaffer
    ports:
      - "54320:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gaffer -d gaffer_test"]
      interval: 1s
      timeout: 5s
      retries: 10
